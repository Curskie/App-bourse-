<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investing Pilot | Quantité & Parts Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #050505; --card: #0c0c0c; --border: #1a1a1a; --accent: #3b82f6; }
        body { background-color: var(--bg); color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); cursor: pointer; transition: 0.2s; }
        .input-pro { background: #121212; border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: white; width: 100%; outline: none; }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; color: #71717a; width: 100%; transition: 0.2s; }
        .sidebar-item.active { background: #161616; color: white; }
        .blur-mode .val-secret { filter: blur(8px); }

        #assetModal {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95);
            z-index: 99999; align-items: center; justify-content: center; padding: 20px;
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
    </style>
</head>
<body class="min-h-screen">

    <div class="flex flex-col lg:flex-row min-h-screen">
        
        <aside class="w-full lg:w-72 bg-[#080808] border-r border-[#1a1a1a] p-6 flex flex-col gap-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 btn-gradient rounded-xl flex items-center justify-center">
                    <i class="fas fa-chart-pie text-white"></i>
                </div>
                <h1 class="text-sm font-extrabold uppercase">Investing Pilot <br><span class="text-blue-500 text-[10px]">QUANTITÉ PRO</span></h1>
            </div>

            <nav class="flex-grow space-y-2">
                <button onclick="switchTab('dashboard')" class="sidebar-item active" id="btn-dashboard">
                    <i class="fas fa-home"></i> <span class="font-semibold text-sm">Dashboard</span>
                </button>
                <button onclick="switchTab('portfolio')" class="sidebar-item" id="btn-portfolio">
                    <i class="fas fa-list"></i> <span class="font-semibold text-sm">Portefeuille</span>
                </button>
                <div class="h-px bg-zinc-900 my-4"></div>
                <button onclick="togglePrivacy()" class="sidebar-item">
                    <i class="fas fa-eye-slash"></i> <span class="font-semibold text-sm">Mode Discret</span>
                </button>
            </nav>
        </aside>

        <main class="flex-grow p-4 lg:p-10">
            <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
                <div>
                    <h2 id="pageTitle" class="text-3xl font-extrabold">Patrimoine</h2>
                    <p class="text-zinc-500 text-sm">Suivi précis des parts détenues</p>
                </div>
                <button onclick="openModal()" class="btn-gradient px-8 py-4 rounded-xl font-bold text-sm flex items-center gap-2">
                    <i class="fas fa-plus-circle"></i> AJOUTER UN ACTIF
                </button>
            </header>

            <div id="tab-dashboard" class="tab-panel active">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                    <div class="glass p-8 border-l-4 border-blue-500">
                        <p class="text-zinc-500 text-[10px] font-black uppercase tracking-widest">Valeur Totale</p>
                        <h3 id="statTotal" class="text-4xl font-black mt-2 val-secret">0,00 €</h3>
                    </div>
                    <div class="glass p-8 border-l-4 border-emerald-500">
                        <p class="text-zinc-500 text-[10px] font-black uppercase tracking-widest">DCA Mensuel</p>
                        <h3 id="statDCA" class="text-4xl font-black mt-2 text-emerald-400 val-secret">0,00 €</h3>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="glass p-8 flex flex-col items-center">
                        <h4 class="w-full font-bold mb-8 text-sm text-zinc-500 uppercase">Répartition Stratégique</h4>
                        <canvas id="mainDonut" style="max-height: 250px;"></canvas>
                    </div>
                    <div class="glass p-8">
                        <h4 class="font-bold mb-6 text-sm text-zinc-500 uppercase">Mes plus grosses lignes</h4>
                        <div id="topAssets" class="space-y-3"></div>
                    </div>
                </div>
            </div>

            <div id="tab-portfolio" class="tab-panel">
                <div class="glass overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-[#121212] border-b border-[#1a1a1a]">
                            <tr class="text-[10px] text-zinc-500 uppercase font-black">
                                <th class="p-6">Actif / Stratégie</th>
                                <th class="p-6 text-center">Quantité (Parts)</th>
                                <th class="p-6 text-right">Valeur Totale</th>
                                <th class="p-6 text-center">Perf. globale</th>
                                <th class="p-6 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="assetTableBody" class="divide-y divide-[#1a1a1a]"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="assetModal">
        <div class="glass w-full max-w-lg p-8 relative">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-black uppercase">Nouvelle Position</h3>
                <button onclick="closeModal()" class="text-zinc-500 hover:text-white text-3xl">&times;</button>
            </div>

            <form id="partsForm" class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-zinc-500 uppercase block mb-1">Nom de l'actif</label>
                    <input type="text" id="f_name" placeholder="Ex: LVMH ou ETF World" class="input-pro" required>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-zinc-500 uppercase block mb-1">Stratégie</label>
                        <select id="f_strat" class="input-pro" onchange="updateUI()">
                            <option value="DCA">DCA (Socle)</option>
                            <option value="Action">Action (Ponctuel)</option>
                        </select>
                    </div>
                    <div id="dca_wrap">
                        <label class="text-[10px] font-black text-zinc-500 uppercase block mb-1">DCA (€/mois)</label>
                        <input type="text" id="f_dca" value="0" class="input-pro">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-zinc-500 uppercase block mb-1">Nombre de parts</label>
                        <input type="text" id="f_qty" placeholder="Ex: 12.5" class="input-pro" required>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-zinc-500 uppercase block mb-1">Prix actuel d'une part</label>
                        <input type="text" id="f_price" placeholder="Ex: 192.50" class="input-pro" required>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-zinc-500 uppercase block mb-1">Total investi au total (PRU)</label>
                    <input type="text" id="f_pru" placeholder="Montant total injecté en €" class="input-pro" required>
                </div>

                <button type="submit" class="w-full btn-gradient py-4 rounded-xl font-black text-sm uppercase mt-4">
                    Sauvegarder la position
                </button>
            </form>
        </div>
    </div>

    <script>
        let portfolio = JSON.parse(localStorage.getItem('ip_qty_vault')) || [];
        let mainChart = null;

        function openModal() { document.getElementById('assetModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('assetModal').style.display = 'none'; }
        function togglePrivacy() { document.body.classList.toggle('blur-mode'); }
        
        function updateUI() {
            const isAction = document.getElementById('f_strat').value === 'Action';
            document.getElementById('f_dca').disabled = isAction;
            document.getElementById('dca_wrap').style.opacity = isAction ? '0.3' : '1';
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        }

        document.getElementById('partsForm').onsubmit = function(e) {
            e.preventDefault();
            const parseNum = (v) => parseFloat(v.toString().replace(',', '.')) || 0;

            const qty = parseNum(document.getElementById('f_qty').value);
            const price = parseNum(document.getElementById('f_price').value);

            const asset = {
                id: Date.now(),
                name: document.getElementById('f_name').value,
                strat: document.getElementById('f_strat').value,
                dca: parseNum(document.getElementById('f_dca').value),
                qty: qty,
                price: price,
                curr: qty * price, // Calcul automatique de la valeur actuelle
                pru: parseNum(document.getElementById('f_pru').value)
            };

            portfolio.push(asset);
            localStorage.setItem('ip_qty_vault', JSON.stringify(portfolio));
            closeModal();
            this.reset();
            render();
        };

        function deleteAsset(id) {
            if(confirm("Supprimer ?")) {
                portfolio = portfolio.filter(a => a.id !== id);
                localStorage.setItem('ip_qty_vault', JSON.stringify(portfolio));
                render();
            }
        }

        function render() {
            const table = document.getElementById('assetTableBody');
            const topList = document.getElementById('topAssets');
            let totalVal = 0, totalDca = 0, totalPru = 0;
            let strats = { 'DCA': 0, 'Action': 0 };

            table.innerHTML = ""; topList.innerHTML = "";
            
            portfolio.forEach(a => {
                totalVal += a.curr;
                totalPru += a.pru;
                totalDca += (a.strat === 'DCA' ? a.dca : 0);
                strats[a.strat] += a.curr;

                const gain = a.curr - a.pru;
                const perf = a.pru > 0 ? ((gain / a.pru) * 100).toFixed(1) : 0;

                table.innerHTML += `
                    <tr class="hover:bg-white/5 transition">
                        <td class="p-6">
                            <div class="font-bold text-sm text-white">${a.name}</div>
                            <div class="text-[9px] text-blue-500 font-bold uppercase">${a.strat}</div>
                        </td>
                        <td class="p-6 text-center text-zinc-400 font-medium">
                            ${a.qty} <span class="text-[10px]">parts</span>
                        </td>
                        <td class="p-6 text-right font-black val-secret text-white">${a.curr.toLocaleString()} €</td>
                        <td class="p-6 text-center font-bold text-xs ${gain >= 0 ? 'text-emerald-400' : 'text-red-400'}">
                            ${gain >= 0 ? '+' : ''}${perf}%
                        </td>
                        <td class="p-6 text-center">
                            <button onclick="deleteAsset(${a.id})" class="text-zinc-800 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('statTotal').innerText = totalVal.toLocaleString() + " €";
            document.getElementById('statDCA').innerText = totalDca.toLocaleString() + " €";

            const ctx = document.getElementById('mainDonut').getContext('2d');
            if(mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Socle DCA', 'Actions Ponctuelles'],
                    datasets: [{ data: [strats['DCA'], strats['Action']], backgroundColor: ['#3b82f6', '#f97316'], borderWidth: 0 }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
            });

            [...portfolio].sort((a,b) => b.curr - a.curr).slice(0,4).forEach(a => {
                topList.innerHTML += `<div class="flex justify-between p-4 bg-zinc-900 rounded-xl border border-zinc-800"><span class="text-xs font-bold">${a.name}</span><span class="font-black text-xs text-blue-500">${a.curr.toLocaleString()} €</span></div>`;
            });
        }

        window.onload = render;
    </script>
</body>
</html>
