<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investing Pilot Private | Elite Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #05070a;
            --bg-card: #0f111a;
            --bg-input: #161923;
            --accent: #3d5afe;
            --accent-gradient: linear-gradient(135deg, #3d5afe 0%, #6366f1 100%);
            --border: #1e2230;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg-main);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .finary-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        .btn-glow {
            background: var(--accent-gradient);
            box-shadow: 0 4px 15px rgba(61, 90, 254, 0.3);
            transition: all 0.2s ease;
        }

        .btn-glow:active { transform: scale(0.98); }

        .input-finary {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: white;
            width: 100%;
            outline: none;
        }

        .input-finary:focus { border-color: var(--accent); }

        /* Animation Modale */
        #assetModal { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.3s ease; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="flex flex-col lg:flex-row min-h-screen">
        
        <aside class="w-full lg:w-72 bg-[#080a10] border-r border-gray-800 p-6 flex flex-col z-50">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 btn-glow rounded-xl flex items-center justify-center">
                    <i class="fas fa-paper-plane text-white text-xl"></i>
                </div>
                <h1 class="text-lg font-extrabold tracking-tighter">INVESTING<span class="text-blue-500">PILOT</span></h1>
            </div>

            <nav class="space-y-2 flex-grow">
                <button onclick="switchTab('dashboard')" class="w-full flex items-center gap-4 p-3 rounded-lg hover:bg-white/5 transition text-gray-400 hover:text-white group">
                    <i class="fas fa-th-large w-5 text-lg group-hover:text-blue-400"></i>
                    <span class="font-medium">Dashboard</span>
                </button>
                <button onclick="switchTab('assets')" class="w-full flex items-center gap-4 p-3 rounded-lg hover:bg-white/5 transition text-gray-400 hover:text-white group">
                    <i class="fas fa-wallet w-5 text-lg group-hover:text-blue-400"></i>
                    <span class="font-medium">Mes Actifs</span>
                </button>
                <button onclick="switchTab('dca')" class="w-full flex items-center gap-4 p-3 rounded-lg hover:bg-white/5 transition text-gray-400 hover:text-white group">
                    <i class="fas fa-calendar-check w-5 text-lg group-hover:text-blue-400"></i>
                    <span class="font-medium">Plan DCA</span>
                </button>
                <div class="pt-6 pb-2 px-3">
                    <span class="text-[10px] uppercase text-gray-600 font-bold tracking-widest">Données</span>
                </div>
                <button onclick="exportData()" class="w-full flex items-center gap-4 p-3 rounded-lg hover:bg-white/5 transition text-gray-400">
                    <i class="fas fa-file-export w-5"></i>
                    <span class="font-medium text-sm">Sauvegarder (JSON)</span>
                </button>
                <label class="w-full flex items-center gap-4 p-3 rounded-lg hover:bg-white/5 transition text-gray-400 cursor-pointer">
                    <i class="fas fa-file-import w-5"></i>
                    <span class="font-medium text-sm">Restaurer</span>
                    <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                </label>
            </nav>

            <div class="mt-auto pt-6">
                <button onclick="clearAllData()" class="text-[10px] text-red-900 hover:text-red-500 transition uppercase font-bold tracking-tighter">Réinitialiser l'application</button>
            </div>
        </aside>

        <main class="flex-grow p-4 lg:p-8">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="pageTitle" class="text-2xl font-bold text-white">Dashboard</h2>
                    <p class="text-gray-500 text-xs mt-1">Investing Pilot Private • Session sécurisée</p>
                </div>
                <button onclick="openModal()" class="btn-glow px-6 py-3 rounded-xl font-bold flex items-center gap-2 text-sm">
                    <i class="fas fa-plus"></i> Ajouter un actif
                </button>
            </header>

            <div id="section-dashboard" class="tab-content active">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                    <div class="finary-card p-6 border-l-4 border-l-blue-500">
                        <p class="text-gray-500 text-xs font-bold uppercase mb-2">Patrimoine Net</p>
                        <h3 id="statTotal" class="text-3xl font-black tabular-nums">0,00 €</h3>
                        <p id="statPerf" class="text-sm mt-2">--</p>
                    </div>
                    <div class="finary-card p-6">
                        <p class="text-gray-500 text-xs font-bold uppercase mb-2">Investissement Mensuel</p>
                        <h3 id="statDCA" class="text-3xl font-black tabular-nums text-blue-400">0,00 €</h3>
                        <p class="text-gray-500 text-sm mt-2">Stratégie DCA active</p>
                    </div>
                    <div class="finary-card p-6">
                        <p class="text-gray-500 text-xs font-bold uppercase mb-2">Plus-value Globale</p>
                        <h3 id="statGain" class="text-3xl font-black tabular-nums">0,00 €</h3>
                        <p id="statGainPerc" class="text-sm mt-2 font-bold">--</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="finary-card p-6 lg:col-span-2 min-h-[400px]">
                        <h4 class="font-bold mb-6">Évolution du portefeuille</h4>
                        <canvas id="mainChart"></canvas>
                    </div>
                    <div class="finary-card p-6">
                        <h4 class="font-bold mb-6">Répartition</h4>
                        <canvas id="donutChart"></canvas>
                        <div id="donutLegend" class="mt-6 space-y-2"></div>
                    </div>
                </div>
            </div>

            <div id="section-assets" class="tab-content">
                <div class="finary-card overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-800/30 text-gray-500 text-[10px] uppercase tracking-widest font-black">
                            <tr>
                                <th class="px-6 py-4">Actif</th>
                                <th class="px-6 py-4">Valeur</th>
                                <th class="px-6 py-4">Performance</th>
                                <th class="px-6 py-4 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="assetTableBody" class="divide-y divide-gray-800">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="section-dca" class="tab-content">
                <div class="max-w-2xl mx-auto space-y-4" id="dcaContainer">
                    </div>
            </div>
        </main>
    </div>

    <div id="assetModal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="modal-content finary-card w-full max-w-lg bg-[#0f111a] p-8 shadow-2xl scale-95 border-blue-900/30">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-bold">Nouvel Investissement</h3>
                <button onclick="closeModal()" class="text-gray-500 hover:text-white p-2"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <form id="assetForm" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-gray-500 uppercase mb-1">Nom</label>
                    <input type="text" id="in_name" required placeholder="Ex: S&P 500, BTC, Immeuble..." class="input-finary">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-gray-500 uppercase mb-1">Catégorie</label>
                        <select id="in_cat" class="input-finary">
                            <option value="Bourse">Actions / ETF</option>
                            <option value="Crypto">Crypto</option>
                            <option value="Immo">Immobilier</option>
                            <option value="Cash">Liquidités</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-500 uppercase mb-1">DCA (€/mois)</label>
                        <input type="number" id="in_dca" value="0" step="any" class="input-finary">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-gray-500 uppercase mb-1">PRU (Prix Achat)</label>
                        <input type="number" id="in_pru" required step="any" placeholder="0.00" class="input-finary">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-500 uppercase mb-1">Valeur Actuelle</label>
                        <input type="number" id="in_curr" required step="any" placeholder="0.00" class="input-finary">
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full btn-glow py-4 rounded-xl font-black text-sm uppercase tracking-widest">
                        Enregistrer l'actif
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // -- STATE MANAGEMENT --
        let assets = JSON.parse(localStorage.getItem('ip_assets')) || [];
        let charts = {};

        // -- NAVIGATION --
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`section-${id}`).classList.add('active');
            document.getElementById('pageTitle').innerText = id.charAt(0).toUpperCase() + id.slice(1);
        }

        // -- MODAL --
        function openModal() {
            const m = document.getElementById('assetModal');
            m.classList.remove('hidden');
            setTimeout(() => m.querySelector('.modal-content').classList.replace('scale-95', 'scale-100'), 10);
        }

        function closeModal() {
            const m = document.getElementById('assetModal');
            m.querySelector('.modal-content').classList.replace('scale-100', 'scale-95');
            setTimeout(() => m.classList.add('hidden'), 200);
        }

        // -- CORE ENGINE --
        document.getElementById('assetForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newAsset = {
                id: Date.now(),
                name: document.getElementById('in_name').value,
                cat: document.getElementById('in_cat').value,
                dca: parseFloat(document.getElementById('in_dca').value) || 0,
                pru: parseFloat(document.getElementById('in_pru').value) || 0,
                curr: parseFloat(document.getElementById('in_curr').value) || 0,
                date: new Date().toLocaleDateString()
            };

            assets.push(newAsset);
            saveAndRender();
            closeModal();
            e.target.reset();
        });

        function deleteAsset(id) {
            if(confirm("Supprimer cet actif ?")) {
                assets = assets.filter(a => a.id !== id);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('ip_assets', JSON.stringify(assets));
            renderDashboard();
            renderAssets();
            renderDCA();
            updateCharts();
        }

        function renderDashboard() {
            let total = 0; let invested = 0; let dcaTotal = 0;
            assets.forEach(a => {
                total += a.curr;
                invested += a.pru;
                dcaTotal += a.dca;
            });

            const gain = total - invested;
            const gainPerc = invested > 0 ? (gain / invested * 100).toFixed(2) : 0;

            document.getElementById('statTotal').innerText = total.toLocaleString('fr-FR', {style:'currency', currency:'EUR'});
            document.getElementById('statDCA').innerText = dcaTotal.toLocaleString('fr-FR', {style:'currency', currency:'EUR'});
            document.getElementById('statGain').innerText = gain.toLocaleString('fr-FR', {style:'currency', currency:'EUR'});
            
            const pEl = document.getElementById('statPerf');
            pEl.innerText = `${gain >= 0 ? '↗' : '↘'} ${Math.abs(gainPerc)}% total`;
            pEl.className = `text-sm mt-2 font-bold ${gain >= 0 ? 'text-green-500' : 'text-red-500'}`;

            const gEl = document.getElementById('statGainPerc');
            gEl.innerText = `Rendement global : ${gainPerc}%`;
            gEl.className = `text-sm mt-2 ${gain >= 0 ? 'text-green-500' : 'text-red-500'}`;
        }

        function renderAssets() {
            const body = document.getElementById('assetTableBody');
            body.innerHTML = assets.map(a => {
                const perf = ((a.curr - a.pru) / a.pru * 100).toFixed(1);
                return `
                    <tr class="hover:bg-white/5 transition">
                        <td class="px-6 py-4">
                            <div class="font-bold text-sm">${a.name}</div>
                            <div class="text-[10px] text-gray-600 uppercase font-black">${a.cat}</div>
                        </td>
                        <td class="px-6 py-4 font-bold text-sm tabular-nums">${a.curr.toLocaleString()} €</td>
                        <td class="px-6 py-4 ${perf >= 0 ? 'text-green-500' : 'text-red-500'} font-bold text-sm">
                            ${perf >= 0 ? '+' : ''}${perf}%
                        </td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="deleteAsset(${a.id})" class="text-gray-700 hover:text-red-500 transition px-2 py-1"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderDCA() {
            const cont = document.getElementById('dcaContainer');
            const activeDCA = assets.filter(a => a.dca > 0);
            cont.innerHTML = activeDCA.length ? activeDCA.map(a => `
                <div class="finary-card p-5 flex justify-between items-center bg-blue-900/5">
                    <div>
                        <p class="text-sm font-bold">${a.name}</p>
                        <p class="text-[10px] text-gray-500 uppercase font-black tracking-widest">${a.cat}</p>
                    </div>
                    <div class="text-right font-black text-blue-500">
                        ${a.dca} € <span class="text-gray-600 text-[10px]">/ mois</span>
                    </div>
                </div>
            `).join('') : '<p class="text-center text-gray-600 py-10 italic">Aucun plan DCA actif</p>';
        }

        // -- CHARTS --
        function initCharts() {
            const commonOptions = { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            };

            charts.main = new Chart(document.getElementById('mainChart').getContext('2d'), {
                type: 'line',
                data: { labels: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'], datasets: [{ data: [0,0,0,0,0,0,0], borderColor: '#3d5afe', tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(61, 90, 254, 0.1)' }] },
                options: commonOptions
            });

            charts.donut = new Chart(document.getElementById('donutChart').getContext('2d'), {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#3d5afe', '#10b981', '#f59e0b', '#ec4899'], borderWidth: 0 }] },
                options: { ...commonOptions, cutout: '80%' }
            });
        }

        function updateCharts() {
            const cats = {};
            assets.forEach(a => cats[a.cat] = (cats[a.cat] || 0) + a.curr);
            
            charts.donut.data.labels = Object.keys(cats);
            charts.donut.data.datasets[0].data = Object.values(cats);
            charts.donut.update();

            // Legend
            const legend = document.getElementById('donutLegend');
            const colors = ['#3d5afe', '#10b981', '#f59e0b', '#ec4899'];
            legend.innerHTML = Object.keys(cats).map((c, i) => `
                <div class="flex justify-between items-center text-[11px] font-bold">
                    <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full" style="background:${colors[i]}"></span><span class="text-gray-400 uppercase">${c}</span></div>
                    <span>${((cats[c] / Object.values(cats).reduce((a,b)=>a+b,0)) * 100).toFixed(1)}%</span>
                </div>
            `).join('');
            
            // Simulation line chart
            const totalVal = assets.reduce((s, a) => s + a.curr, 0);
            charts.main.data.datasets[0].data = [totalVal*0.95, totalVal*0.97, totalVal*0.96, totalVal*0.98, totalVal*0.99, totalVal*0.995, totalVal];
            charts.main.update();
        }

        function exportData() {
            const blob = new Blob([JSON.stringify({assets})], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `investing-pilot-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = JSON.parse(event.target.result);
                if(data.assets) {
                    assets = da
