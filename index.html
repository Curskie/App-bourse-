<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Investing Pilot Private</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 20px; }
        .btn-blue { background: #2563eb; color: white; padding: 12px 20px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; padding: 15px; }
        input, select { background: #1e293b; border: 1px solid #334155; color: white; padding: 12px; border-radius: 6px; width: 100%; margin-bottom: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-8">
        <h1 class="text-xl font-bold text-blue-500 uppercase tracking-tighter">Investing Pilot Private</h1>
        <button onclick="openForm()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg font-bold text-sm">
            + AJOUTER
        </button>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 text-center">
        <div class="card border-l-4 border-blue-500">
            <p class="text-xs text-gray-400 uppercase">Patrimoine Total</p>
            <h2 id="totalDisplay" class="text-3xl font-black mt-2">0,00 €</h2>
        </div>
        <div class="card border-l-4 border-green-500">
            <p class="text-xs text-gray-400 uppercase">DCA Mensuel</p>
            <h2 id="dcaDisplay" class="text-3xl font-black mt-2 text-green-400">0,00 €</h2>
        </div>
    </div>

    <div class="card">
        <h3 class="font-bold mb-4 border-b border-slate-700 pb-2">Mes Investissements</h3>
        <div id="assetsList" class="space-y-4">
            <p class="text-gray-500 italic text-sm py-4">Aucun actif. Cliquez sur Ajouter.</p>
        </div>
    </div>

    <div id="modal">
        <div class="bg-[#0f172a] p-6 rounded-xl w-full max-w-md border border-blue-500/30">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold uppercase">Nouvel Actif</h2>
                <button onclick="closeForm()" class="text-gray-400">Fermer</button>
            </div>
            
            <form id="investForm">
                <label class="text-xs text-gray-400 uppercase font-bold">Nom de l'actif</label>
                <input type="text" id="nom" placeholder="Ex: S&P 500 ou BTC" required>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-xs text-gray-400 uppercase font-bold">DCA (€/mois)</label>
                        <input type="number" id="dca" value="0" step="any">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 uppercase font-bold">Valeur Actuelle (€)</label>
                        <input type="number" id="valeur" placeholder="0.00" step="any" required>
                    </div>
                </div>

                <button type="submit" class="btn-blue mt-4">SAUVEGARDER</button>
            </form>
        </div>
    </div>

    <script>
        // Diagnostic : On vérifie que le script se lance
        console.log("Script Investing Pilot chargé.");

        // Charger les données
        let data = JSON.parse(localStorage.getItem('ip_v3_data')) || [];

        function openForm() {
            document.getElementById('modal').style.display = 'flex';
        }

        function closeForm() {
            document.getElementById('modal').style.display = 'none';
        }

        // Action de sauvegarde
        document.getElementById('investForm').onsubmit = function(e) {
            e.preventDefault();
            
            try {
                const nouvelActif = {
                    id: Date.now(),
                    nom: document.getElementById('nom').value,
                    dca: parseFloat(document.getElementById('dca').value) || 0,
                    valeur: parseFloat(document.getElementById('valeur').value) || 0
                };

                data.push(nouvelActif);
                localStorage.setItem('ip_v3_data', JSON.stringify(data));
                
                render();
                closeForm();
                this.reset();
                alert("Actif ajouté avec succès !");
            } catch (err) {
                alert("Erreur lors de l'ajout : " + err);
            }
        };

        function deleteItem(id) {
            if(confirm("Supprimer ?")) {
                data = data.filter(i => i.id !== id);
                localStorage.setItem('ip_v3_data', JSON.stringify(data));
                render();
            }
        }

        function render() {
            const list = document.getElementById('assetsList');
            const totalDisplay = document.getElementById('totalDisplay');
            const dcaDisplay = document.getElementById('dcaDisplay');

            if (data.length === 0) {
                list.innerHTML = '<p class="text-gray-500 italic text-sm py-4">Aucun actif. Cliquez sur Ajouter.</p>';
                totalDisplay.innerText = "0,00 €";
                dcaDisplay.innerText = "0,00 €";
                return;
            }

            let total = 0;
            let dcaTotal = 0;
            list.innerHTML = "";

            data.forEach(item => {
                total += item.valeur;
                dcaTotal += item.dca;

                list.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-slate-800/50 rounded-lg border border-slate-700">
                        <div>
                            <div class="font-bold text-blue-300">${item.nom}</div>
                            <div class="text-[10px] text-gray-500 uppercase">DCA: ${item.dca} €/mois</div>
                        </div>
                        <div class="text-right flex items-center gap-4">
                            <span class="font-black">${item.valeur.toLocaleString()} €</span>
                            <button onclick="deleteItem(${item.id})" class="text-red-900 text-xs">✕</button>
                        </div>
                    </div>
                `;
            });

            totalDisplay.innerText = total.toLocaleString() + " €";
            dcaDisplay.innerText = dcaTotal.toLocaleString() + " €";
        }

        // Lancement initial
        render();
    </script>
</body>
</html>
